<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertitore Coordinate | UTM WGS84 ➔ Gauss-Boaga Roma 1940</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1a5276;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 5px solid #1abc9c;
            border-radius: 4px;
            display: none;
        }
        .result-box h3 {
            margin-top: 0;
            color: #16a085;
        }
        .warning {
            font-size: 0.85em;
            color: #e67e22;
            margin-top: 15px;
            text-align: justify;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Convertitore Nord Italia</h2>
    
    <div class="form-group">
        <label for="zonaWGS84">Fuso di Origine (UTM WGS84):</label>
        <select id="zonaWGS84">
            <option value="EPSG:32632" selected>Zona 32T (Nord-Ovest Italia)</option>
            <option value="EPSG:32633">Zona 33T (Nord-Est Italia)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="estWGS84">Coordinata Est (X) in metri:</label>
        <input type="number" id="estWGS84" placeholder="Es. 400000.00" step="any" required>
    </div>

    <div class="form-group">
        <label for="nordWGS84">Coordinata Nord (Y) in metri:</label>
        <input type="number" id="nordWGS84" placeholder="Es. 5000000.00" step="any" required>
    </div>

    <div class="form-group">
        <label for="fusoRoma40">Fuso di Destinazione (Gauss-Boaga):</label>
        <select id="fusoRoma40">
            <option value="EPSG:3003" selected>Fuso Ovest - EPSG: 3003</option>
            <option value="EPSG:3004">Fuso Est - EPSG: 3004</option>
        </select>
    </div>

    <button onclick="convertiCoordinate()">Converti in Roma 1940</button>

    <div id="risultato" class="result-box">
        <h3>Risultato (Gauss-Boaga)</h3>
        <p><strong>Est (X):</strong> <span id="outEst"></span></p>
        <p><strong>Nord (Y):</strong> <span id="outNord"></span></p>
    </div>

    <p class="warning">
        <strong>Nota:</strong> EPSG:32632 copre l'intera zona 32 dell'emisfero Nord (inclusa la fascia T). La conversione usa i 7 parametri di Helmert. Tolleranza attesa: 1-4 metri rispetto ai rigidi confini catastali.
    </p>
</div>

<script>
    // Definiamo i Sistemi di Riferimento (EPSG:32632 corrisponde alla Zona 32 emisfero Nord, inclusa la fascia T)
    proj4.defs("EPSG:32632", "+proj=utm +zone=32 +datum=WGS84 +units=m +no_defs");
    proj4.defs("EPSG:32633", "+proj=utm +zone=33 +datum=WGS84 +units=m +no_defs");

    // Gauss-Boaga Roma 1940 (Ovest ed Est)
    proj4.defs("EPSG:3003", "+proj=tmerc +lat_0=0 +lon_0=9 +k=0.9996 +x_0=1500000 +y_0=0 +ellps=intl +towgs84=-104.1,-49.1,-9.9,0.971,-2.917,0.714,-11.68 +units=m +no_defs");
    proj4.defs("EPSG:3004", "+proj=tmerc +lat_0=0 +lon_0=15 +k=0.9996 +x_0=2520000 +y_0=0 +ellps=intl +towgs84=-104.1,-49.1,-9.9,0.971,-2.917,0.714,-11.68 +units=m +no_defs");

    function convertiCoordinate() {
        const est = parseFloat(document.getElementById('estWGS84').value);
        const nord = parseFloat(document.getElementById('nordWGS84').value);
        
        const epsgOrigine = document.getElementById('zonaWGS84').value;
        const epsgDestinazione = document.getElementById('fusoRoma40').value;

        if (isNaN(est) || isNaN(nord)) {
            alert("Per favore, inserisci valori numerici validi per le coordinate.");
            return;
        }

        try {
            const coordConvertite = proj4(epsgOrigine, epsgDestinazione, [est, nord]);

            document.getElementById('outEst').innerText = coordConvertite[0].toFixed(3) + " m";
            document.getElementById('outNord').innerText = coordConvertite[1].toFixed(3) + " m";
            
            document.getElementById('risultato').style.display = 'block';
        } catch (error) {
            alert("Si è verificato un errore nella conversione.");
            console.error(error);
        }
    }
</script>

</body>
</html>
