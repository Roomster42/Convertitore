<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertitore Coordinate | WGS84 ⟷ Roma 1940</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1a5276;
        }
        .btn-reverse {
            background-color: #27ae60;
        }
        .btn-reverse:hover {
            background-color: #1e8449;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 5px solid #1abc9c;
            border-radius: 4px;
            display: none;
        }
        .result-box.reverse {
            background-color: #eaf2f8;
            border-left: 5px solid #3498db;
        }
        .result-box h3 {
            margin-top: 0;
            color: #16a085;
        }
        .result-box.reverse h3 {
            color: #2980b9;
        }
        .warning {
            font-size: 0.85em;
            color: #e67e22;
            margin-top: 15px;
            text-align: justify;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>UTM WGS84 ➔ Roma 1940</h2>
    
    <div class="form-group">
        <label for="zonaWGS84">Fuso di Origine (UTM WGS84):</label>
        <select id="zonaWGS84">
            <option value="EPSG:32632" selected>Zona 32T (Nord-Ovest Italia)</option>
            <option value="EPSG:32633">Zona 33T (Nord-Est Italia)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="estWGS84">Coordinata Est (X) in metri:</label>
        <input type="number" id="estWGS84" placeholder="Es. 400000.00" step="any">
    </div>

    <div class="form-group">
        <label for="nordWGS84">Coordinata Nord (Y) in metri:</label>
        <input type="number" id="nordWGS84" placeholder="Es. 5000000.00" step="any">
    </div>

    <div class="form-group">
        <label for="fusoRoma40">Fuso di Destinazione (Gauss-Boaga):</label>
        <select id="fusoRoma40">
            <option value="EPSG:3003" selected>Fuso Ovest - EPSG: 3003</option>
            <option value="EPSG:3004">Fuso Est - EPSG: 3004</option>
        </select>
    </div>

    <button onclick="convertiInRoma40()">Converti in Roma 1940</button>

    <div id="risultatoRoma40" class="result-box">
        <h3>Risultato (Gauss-Boaga)</h3>
        <p><strong>Est (X):</strong> <span id="outEstRoma40"></span></p>
        <p><strong>Nord (Y):</strong> <span id="outNordRoma40"></span></p>
    </div>
</div>

<div class="container">
    <h2>Roma 1940 ➔ UTM WGS84</h2>
    
    <div class="form-group">
        <label for="fusoRoma40_inv">Fuso di Origine (Gauss-Boaga):</label>
        <select id="fusoRoma40_inv">
            <option value="EPSG:3003" selected>Fuso Ovest - EPSG: 3003</option>
            <option value="EPSG:3004">Fuso Est - EPSG: 3004</option>
        </select>
    </div>

    <div class="form-group">
        <label for="estRoma40">Coordinata Est (X) in metri:</label>
        <input type="number" id="estRoma40" placeholder="Es. 1500000.00" step="any">
    </div>

    <div class="form-group">
        <label for="nordRoma40">Coordinata Nord (Y) in metri:</label>
        <input type="number" id="nordRoma40" placeholder="Es. 5000000.00" step="any">
    </div>

    <div class="form-group">
        <label for="zonaWGS84_inv">Fuso di Destinazione (UTM WGS84):</label>
        <select id="zonaWGS84_inv">
            <option value="EPSG:32632" selected>Zona 32T (Nord-Ovest Italia)</option>
            <option value="EPSG:32633">Zona 33T (Nord-Est Italia)</option>
        </select>
    </div>

    <button class="btn-reverse" onclick="convertiInWGS84()">Converti in WGS84</button>

    <div id="risultatoWGS84" class="result-box reverse">
        <h3>Risultato (UTM WGS84)</h3>
        <p><strong>Est (X):</strong> <span id="outEstWGS84"></span></p>
        <p><strong>Nord (Y):</strong> <span id="outNordWGS84"></span></p>
    </div>
    
    <p class="warning">
        <strong>Nota:</strong> Entrambe le conversioni utilizzano i 7 parametri di Helmert. La tolleranza attesa è di 1-4 metri rispetto al dato di altissima precisione (Grigliati IGM).
    </p>
</div>

<script>
    // 1. Definiamo i Sistemi di Riferimento 
    proj4.defs("EPSG:32632", "+proj=utm +zone=32 +datum=WGS84 +units=m +no_defs");
    proj4.defs("EPSG:32633", "+proj=utm +zone=33 +datum=WGS84 +units=m +no_defs");

    proj4.defs("EPSG:3003", "+proj=tmerc +lat_0=0 +lon_0=9 +k=0.9996 +x_0=1500000 +y_0=0 +ellps=intl +towgs84=-104.1,-49.1,-9.9,0.971,-2.917,0.714,-11.68 +units=m +no_defs");
    proj4.defs("EPSG:3004", "+proj=tmerc +lat_0=0 +lon_0=15 +k=0.9996 +x_0=2520000 +y_0=0 +ellps=intl +towgs84=-104.1,-49.1,-9.9,0.971,-2.917,0.714,-11.68 +units=m +no_defs");

    // 2. Funzione: WGS84 -> Roma 1940
    function convertiInRoma40() {
        const est = parseFloat(document.getElementById('estWGS84').value);
        const nord = parseFloat(document.getElementById('nordWGS84').value);
        const epsgOrigine = document.getElementById('zonaWGS84').value;
        const epsgDestinazione = document.getElementById('fusoRoma40').value;

        if (isNaN(est) || isNaN(nord)) {
            alert("Per favore, inserisci valori numerici validi.");
            return;
        }

        try {
            const coord = proj4(epsgOrigine, epsgDestinazione, [est, nord]);
            document.getElementById('outEstRoma40').innerText = coord[0].toFixed(3) + " m";
            document.getElementById('outNordRoma40').innerText = coord[1].toFixed(3) + " m";
            document.getElementById('risultatoRoma40').style.display = 'block';
        } catch (error) {
            alert("Errore nella conversione.");
            console.error(error);
        }
    }

    // 3. Funzione: Roma 1940 -> WGS84
    function convertiInWGS84() {
        const est = parseFloat(document.getElementById('estRoma40').value);
        const nord = parseFloat(document.getElementById('nordRoma40').value);
        const epsgOrigine = document.getElementById('fusoRoma40_inv').value;
        const epsgDestinazione = document.getElementById('zonaWGS84_inv').value;

        if (isNaN(est) || isNaN(nord)) {
            alert("Per favore, inserisci valori numerici validi.");
            return;
        }

        try {
            // Proj4 inverte automaticamente i parametri matematici
            const coord = proj4(epsgOrigine, epsgDestinazione, [est, nord]);
            document.getElementById('outEstWGS84').innerText = coord[0].toFixed(3) + " m";
            document.getElementById('outNordWGS84').innerText = coord[1].toFixed(3) + " m";
            document.getElementById('risultatoWGS84').style.display = 'block';
        } catch (error) {
            alert("Errore nella conversione.");
            console.error(error);
        }
    }
</script>

</body>
</html>
